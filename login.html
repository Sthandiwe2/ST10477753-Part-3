<html lang="en">

    <title>Login | Lionel Tech Support</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="author" content="Lionel Tech Support">
<meta name="robots" content="noindex, nofollow">

<body>

    <header>
        <img src="images/tech support logo.png" alt="Lionel Tech Support Logo" class="logo">

        <h1>Lionel Tech Support</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>

            <a href="ticket.html">Ticket System</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main>

        <div class="login-container">

            <img src="images/tech support logo.png" alt="Login Illustration" class="login-image">

            <h2>Welcome Back</h2>

            <p>Sign in to access your support tickets and account.</p>

            <form onsubmit="login(); return false;">

                <input type="text"
                       id="username"
                       placeholder="Username"
                       required>

                <input type="password"
                       id="password"
                       placeholder="Password"
                       required>

                <button type="submit">Login</button>

            </form>

            <p id="loginMessage"></p>

        </div>

    </main>
